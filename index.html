<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bark Ornament — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4fb;
  --bg2: #e4ecf7;
  --white: #ffffff;
  --navy: #1a2e52;
  --navy2: #243a68;
  --blue: #2563eb;
  --blue-mid: #3b82f6;
  --blue-light: #bfdbfe;
  --blue-pale: #eff6ff;
  --orange: #f59e0b;
  --orange2: #f97316;
  --text: #1e293b;
  --text2: #475569;
  --muted: #94a3b8;
  --border: #dbeafe;
  --border2: #cbd5e1;
  --green: #10b981;
  --red: #ef4444;
  --sh-sm: 0 1px 4px rgba(26,46,82,0.08);
  --sh: 0 4px 16px rgba(26,46,82,0.11);
  --sh-lg: 0 12px 36px rgba(26,46,82,0.16);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Nunito", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }



/* MAIN */
.main { min-height: 100vh; display: flex; flex-direction: column; }

/* TOPBAR */
.topbar {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 0 28px; height: 62px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: var(--sh-sm);
}
.tb-brand { display: flex; align-items: center; gap: 12px; }
.tb-logo-img {
  height: 40px; width: 40px; border-radius: 10px;
  object-fit: cover; border: 1.5px solid var(--border);
}
.tb-text {}
.tb-name {
  font-family: "Playfair Display", serif;
  font-size: 1.05rem; color: var(--navy); font-weight: 700; line-height: 1.1;
}
.tb-sub { font-size: 0.67rem; color: var(--muted); font-weight: 600; letter-spacing: 0.7px; text-transform: uppercase; }
.tb-right { display: flex; align-items: center; gap: 10px; }

.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 7px 13px; width: 200px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-box:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
.search-box input { background: none; border: none; outline: none; font-family: "Nunito", sans-serif; font-size: 0.84rem; color: var(--text); width: 100%; }
.search-box input::placeholder { color: var(--muted); }

.btn-add {
  display: flex; align-items: center; gap: 7px;
  background: linear-gradient(135deg, var(--navy), var(--blue));
  color: white; border: none; border-radius: 10px;
  padding: 9px 17px; font-family: "Nunito", sans-serif;
  font-weight: 700; font-size: 0.82rem; cursor: pointer;
  box-shadow: 0 2px 8px rgba(26,46,82,0.28);
  transition: box-shadow 0.2s, transform 0.15s;
}
.btn-add:hover { box-shadow: 0 5px 16px rgba(26,46,82,0.38); transform: translateY(-1px); }

/* HERO */
.hero {
  background: linear-gradient(130deg, var(--navy) 0%, var(--navy2) 45%, var(--blue) 100%);
  padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between;
  position: relative; overflow: hidden;
  min-height: 140px;
}
.hero::before {
  content: ""; position: absolute; right: -20px; top: -60px;
  width: 200px; height: 200px;
  background: rgba(255,255,255,0.04); border-radius: 50%;
}
.hero::after {
  content: ""; position: absolute; right: 90px; bottom: -65px;
  width: 130px; height: 130px;
  background: rgba(255,255,255,0.04); border-radius: 50%;
}

/* HERO LOGO */
.hero-logo-wrap {
  display: flex; align-items: center; gap: 24px; z-index: 1;
}
.hero-logo-img {
  height: 90px; width: 90px; border-radius: 16px;
  object-fit: cover;
  border: 3px solid rgba(255,255,255,0.2);
  box-shadow: 0 8px 28px rgba(0,0,0,0.35);
  background: white;
}
.hero-brand {}
.hero-brand h1 {
  font-family: "Playfair Display", serif;
  color: white; font-size: 1.5rem; font-weight: 700;
  letter-spacing: -0.3px; margin-bottom: 3px;
}
.hero-brand p { color: rgba(255,255,255,0.58); font-size: 0.8rem; font-weight: 400; }
.hero-brand .hero-tagline {
  display: inline-block; margin-top: 8px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
  border-radius: 20px; padding: 3px 12px;
  font-size: 0.7rem; color: rgba(255,255,255,0.75);
  font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
}

/* HERO KPIs */
.hero-kpis { display: flex; gap: 12px; z-index: 1; }
.kpi {
  text-align: center;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 14px; padding: 14px 20px;
  backdrop-filter: blur(6px); min-width: 80px;
}
.kpi-v {
  font-size: 1.6rem; font-weight: 700; color: white;
  font-family: "Playfair Display", serif; line-height: 1;
}
.kpi-l { font-size: 0.63rem; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 4px; }

/* CONTENT */
.content { padding: 24px 28px; flex: 1; }

/* SECTION */
.section { margin-bottom: 28px; }
.sec-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
}
.sec-name {
  display: flex; align-items: center; gap: 8px;
  font-family: "Playfair Display", serif;
  font-size: 0.96rem; color: var(--navy); font-weight: 600;
}
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sec-badge {
  font-family: "Nunito", sans-serif; font-size: 0.67rem;
  background: var(--blue-pale); color: var(--blue);
  border: 1px solid var(--blue-light); border-radius: 20px;
  padding: 2px 9px; font-weight: 700;
}

/* GRID */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 12px; }

/* LINK CARD */
.link-card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 20px 16px 15px;
  cursor: pointer; text-decoration: none; display: block;
  position: relative; overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
  box-shadow: var(--sh-sm); animation: up 0.28s ease both;
}
@keyframes up { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.link-card::after {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--navy), var(--blue-mid));
  opacity: 0; transition: opacity 0.2s;
}
.link-card:hover { border-color: var(--blue-light); box-shadow: var(--sh-lg); transform: translateY(-3px); }
.link-card:hover::after { opacity: 1; }

.card-ico {
  width: 44px; height: 44px; border-radius: 11px;
  background: var(--blue-pale);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin-bottom: 12px; transition: background 0.2s;
}
.link-card:hover .card-ico { background: #dbeafe; }
.card-title { font-weight: 700; font-size: 0.87rem; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
.card-arrow {
  position: absolute;
  bottom: 14px; right: 14px;
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--blue-pale);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.2s;
}
.link-card:hover .card-arrow {
  background: var(--blue-light);
  transform: translate(2px, -2px);
}
.card-arrow svg { display: block; }

/* ADD CARD */
.add-card {
  background: transparent; border: 2px dashed var(--border2);
  border-radius: 14px; padding: 20px 16px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 7px; color: var(--muted); font-family: "Nunito", sans-serif;
  font-size: 0.78rem; font-weight: 700; min-height: 116px;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.add-card:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-pale); }

/* EMPTY */
.empty { text-align: center; padding: 60px 24px; color: var(--muted); }
.empty-ico { font-size: 3rem; margin-bottom: 12px; }
.empty-t { font-size: 1rem; font-weight: 700; color: var(--text2); margin-bottom: 5px; }
.empty-s { font-size: 0.82rem; }

/* SETTINGS PANEL */
.settings-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.4); backdrop-filter: blur(4px);
  z-index: 350; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.settings-overlay.open { opacity: 1; pointer-events: all; }
.settings-panel {
  position: absolute; right: 0; top: 0; bottom: 0; width: 380px;
  background: var(--white); box-shadow: var(--sh-lg);
  display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform 0.25s ease;
  border-left: 1px solid var(--border);
}
.settings-overlay.open .settings-panel { transform: translateX(0); }
.settings-hd {
  padding: 22px 24px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.settings-ttl {
  font-family: "Playfair Display", serif; font-size: 1.1rem; color: var(--navy);
}
.settings-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.settings-section { margin-bottom: 26px; }
.settings-section-label {
  font-size: 0.68rem; font-weight: 700; color: var(--blue);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
}
/* Category item in settings */
.cat-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg);
  margin-bottom: 8px;
}
.cat-item-name { flex: 1; font-size: 0.85rem; font-weight: 600; color: var(--text); }
.cat-item-count { font-size: 0.72rem; color: var(--muted); font-weight: 600; margin-right: 4px; }
.ico-btn {
  width: 28px; height: 28px; border-radius: 7px; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: background 0.15s;
}
.ico-btn.e { background: rgba(59,130,246,0.1); color: var(--blue); }
.ico-btn.e:hover { background: rgba(59,130,246,0.22); }
.ico-btn.d { background: rgba(239,68,68,0.09); color: var(--red); }
.ico-btn.d:hover { background: rgba(239,68,68,0.2); }

/* MODAL */
.overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,0.45);
  backdrop-filter: blur(5px); z-index: 400;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--white); border-radius: 20px; padding: 28px 30px;
  width: 440px; max-width: 95vw; box-shadow: var(--sh-lg);
  border-top: 4px solid var(--blue);
  transform: scale(0.95) translateY(10px);
  transition: transform 0.22s cubic-bezier(.34,1.3,.64,1);
}
.overlay.open .modal { transform: scale(1) translateY(0); }
.modal-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-ttl { font-family: "Playfair Display", serif; font-size: 1.1rem; color: var(--navy); }
.modal-x {
  width: 30px; height: 30px; border-radius: 8px; border: none;
  background: var(--bg); color: var(--muted); cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.modal-x:hover { background: var(--bg2); color: var(--text); }
.field { margin-bottom: 13px; }
.field label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
.field input, .field select {
  width: 100%; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 9px 13px; color: var(--text);
  font-family: "Nunito", sans-serif; font-size: 0.86rem; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field input:focus, .field select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
.emoji-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
.emo {
  width: 33px; height: 33px; border-radius: 8px;
  border: 1.5px solid var(--border); background: var(--bg);
  font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, background 0.15s;
}
.emo.on, .emo:hover { border-color: var(--blue); background: var(--blue-pale); }
.modal-ft {
  display: flex; justify-content: flex-end; gap: 8px;
  margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border);
}
.btn-cancel {
  background: var(--bg); border: 1px solid var(--border2); color: var(--text2);
  border-radius: 10px; padding: 8px 18px;
  font-family: "Nunito", sans-serif; font-weight: 600; font-size: 0.83rem;
  cursor: pointer; transition: background 0.15s;
}
.btn-cancel:hover { background: var(--bg2); }

/* TOAST */
.toast {
  position: fixed; bottom: 22px; right: 22px;
  background: var(--white); border: 1px solid var(--border);
  border-radius: 12px; padding: 11px 17px;
  font-size: 0.81rem; font-weight: 600; z-index: 600;
  display: flex; align-items: center; gap: 9px;
  box-shadow: var(--sh-lg);
  transform: translateY(60px); opacity: 0;
  transition: all 0.3s cubic-bezier(.34,1.4,.64,1);
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 4px solid var(--green); }
.toast.error { border-left: 4px solid var(--red); }
.toast.info { border-left: 4px solid var(--blue); }

/* RENAME */
.ren-input {
  border: none; border-bottom: 2px solid var(--blue);
  background: none; font-family: "Playfair Display", serif;
  font-size: 0.96rem; color: var(--navy); outline: none; width: 200px;
}
.btn-settings-new {
  width: 100%; margin-top: 10px; padding: 10px;
  background: var(--blue-pale); border: 1.5px dashed var(--blue-light);
  border-radius: 10px; color: var(--blue); font-family: "Nunito", sans-serif;
  font-weight: 700; font-size: 0.82rem; cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.btn-settings-new:hover { background: #dbeafe; border-color: var(--blue); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--blue-light); border-radius: 4px; }
</style>
</head>

<div class="toast" id="toast"></div>

<script>
const EMOJIS = ["📊","🏦","📋","💰","🧾","📁","🗂️","📈","📌","🔑","🌐","📧","📦","🛒","✈️","🔧","⚙️","💼","📝","🎯","🗃️","📅","💡","🔗","🖥️","📤","📥","🏷️","📞","🌍"];
const COLORS = ["#2563eb","#0ea5e9","#6366f1","#10b981","#f59e0b","#8b5cf6","#ec4899"];

let DB = JSON.parse(localStorage.getItem("boDash3") || "null") || {
  cats: [
    { id: "c1", name: "📊 Finance & Reports" },
    { id: "c2", name: "🛠️ Tools & Apps" }
  ],
  links: [
    { id: "l1", title: "Main Cash Book", url: "https://barkornamentjaz.github.io/bark-ornament-Main-Cash/index.html", cat: "c1", icon: "🏦" },
    { id: "l2", title: "Daily Finance Report", url: "https://barkornamentjaz.github.io/DailyFinanceReport/index.html", cat: "c1", icon: "📊" },
    { id: "l3", title: "Sha & Sha Invoice", url: "https://barkornamentjaz.github.io/Invoices_Ship_Sha/", cat: "c1", icon: "🧾" }
  ]
};

let editId = null, picked = "🔗";
const persist = () => localStorage.setItem("boDash3", JSON.stringify(DB));

function renderAll() {
  document.getElementById("kpiLinks").textContent = DB.links.length;
  document.getElementById("kpiCats").textContent = DB.cats.length;
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const area = document.getElementById("content");
  area.innerHTML = "";
  const fl = q ? DB.links.filter(l => l.title.toLowerCase().includes(q)) : DB.links;
  if (!DB.links.length) {
    area.innerHTML = `<div class="empty"><div class="empty-ico">🚀</div><div class="empty-t">No links yet</div><div class="empty-s">Click <b>Add Link</b> to get started</div></div>`;
    return;
  }
  if (q && !fl.length) {
    area.innerHTML = `<div class="empty"><div class="empty-ico">🔍</div><div class="empty-t">No results</div><div class="empty-s">Nothing matches "<b>${q}</b>"</div></div>`;
    return;
  }
  DB.cats.forEach((cat, idx) => {
    const items = fl.filter(l => l.cat === cat.id);
    if (!items.length) return;
    const sec = document.createElement("div");
    sec.className = "section";
    sec.innerHTML = `<div class="sec-head"><div class="sec-name"><span class="cat-dot" style="background:${COLORS[idx%COLORS.length]}"></span>${cat.name}<span class="sec-badge">${items.length}</span></div></div><div class="cards-grid" id="g_${cat.id}"></div>`;
    area.appendChild(sec);
    const grid = document.getElementById("g_" + cat.id);
    items.forEach((lnk, i) => {
      const a = document.createElement("a");
      a.className = "link-card"; a.href = lnk.url; a.target = "_blank"; a.rel = "noopener noreferrer";
      a.style.animationDelay = (i * 0.05) + "s";
      a.innerHTML = `<div class="card-ico">${lnk.icon}</div><div class="card-title">${lnk.title}</div><div class="card-arrow"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></div>`;
      grid.appendChild(a);
    });

  });
  const known = DB.cats.map(c => c.id);
  const uncat = fl.filter(l => !known.includes(l.cat));
  if (uncat.length) {
    const sec = document.createElement("div"); sec.className = "section";
    sec.innerHTML = `<div class="sec-head"><div class="sec-name"><span class="cat-dot" style="background:var(--muted)"></span>Uncategorised<span class="sec-badge">${uncat.length}</span></div></div><div class="cards-grid" id="gU"></div>`;
    area.appendChild(sec);
    uncat.forEach(lnk => {
      const a = document.createElement("a");
      a.className = "link-card"; a.href = lnk.url; a.target = "_blank";
      a.innerHTML = `<div class="card-ico">${lnk.icon}</div><div class="card-title">${lnk.title}</div><div class="card-arrow"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></div>`;
      document.getElementById("gU").appendChild(a);
    });
  }
}

// SETTINGS
function openSettings() {
  renderCatList();
  document.getElementById("settingsOverlay").classList.add("open");
}
function closeSettings() { document.getElementById("settingsOverlay").classList.remove("open"); }
function settingsBgClick(e) { if (e.target.id === "settingsOverlay") closeSettings(); }

function renderCatList() {
  const list = document.getElementById("catList");
  list.innerHTML = "";
  DB.cats.forEach(cat => {
    const count = DB.links.filter(l => l.cat === cat.id).length;
    const item = document.createElement("div");
    item.className = "cat-item";
    item.innerHTML = `
      <span class="cat-item-name" id="sl_${cat.id}">${cat.name}</span>
      <span class="cat-item-count">${count} link${count !== 1 ? "s" : ""}</span>
      <button class="ico-btn e" onclick="renCatSettings('${cat.id}')">✏️</button>
      <button class="ico-btn d" onclick="delCat('${cat.id}', true)">🗑️</button>
    `;
    list.appendChild(item);
  });
}

function renCatSettings(id) {
  const cat = DB.cats.find(c => c.id === id);
  const el = document.getElementById("sl_" + id);
  if (!el) return;
  el.innerHTML = `<input class="ren-input" id="sri_${id}" value="${cat.name}" style="width:100%">`;
  const inp = document.getElementById("sri_" + id);
  inp.focus(); inp.select();
  const done = () => {
    if (inp.value.trim()) { cat.name = inp.value.trim(); persist(); }
    renderCatList(); renderAll();
  };
  inp.onblur = done;
  inp.onkeydown = e => { if (e.key === "Enter") done(); if (e.key === "Escape") { renderCatList(); } };
}

function addCategoryFromSettings() {
  const name = prompt("New category name:");
  if (!name || !name.trim()) return;
  DB.cats.push({ id: "c" + Date.now(), name: name.trim() });
  persist(); renderCatList(); renderAll();
}

function delCat(id, fromSettings = false) {
  const n = DB.links.filter(l => l.cat === id).length;
  if (!confirm("Delete this category" + (n ? " and its " + n + " link(s)" : "") + "?")) return;
  DB.cats = DB.cats.filter(c => c.id !== id);
  DB.links = DB.links.filter(l => l.cat !== id);
  persist();
  if (fromSettings) renderCatList();
  renderAll();
  toast("🗑️ Category deleted", "info");
}

// MODAL
function openModal(defCat = null) {
  editId = null; picked = "🔗";
  document.getElementById("mTitle").textContent = "Add New Link";
  document.getElementById("iTitle").value = "";
  document.getElementById("iURL").value = "";
  buildSel(defCat); buildEmoji();
  document.getElementById("overlay").classList.add("open");
  setTimeout(() => document.getElementById("iTitle").focus(), 100);
}

function editLink(id) {
  const lnk = DB.links.find(l => l.id === id);
  if (!lnk) return;
  editId = id; picked = lnk.icon;
  document.getElementById("mTitle").textContent = "Edit Link";
  document.getElementById("iTitle").value = lnk.title;
  document.getElementById("iURL").value = lnk.url;
  buildSel(lnk.cat); buildEmoji();
  document.getElementById("overlay").classList.add("open");
}

function closeModal() { document.getElementById("overlay").classList.remove("open"); editId = null; }
function bgClick(e) { if (e.target.id === "overlay") closeModal(); }

function buildSel(sel) {
  const s = document.getElementById("iCat");
  s.innerHTML = "";
  DB.cats.forEach(c => {
    const o = document.createElement("option");
    o.value = c.id; o.textContent = c.name;
    if (c.id === sel) o.selected = true;
    s.appendChild(o);
  });
  const no = document.createElement("option");
  no.value = "__new__"; no.textContent = "＋ New Category...";
  s.appendChild(no);
  if (!sel && DB.cats.length) s.value = DB.cats[0].id;
  document.getElementById("newCatF").style.display = "none";
}

function catChange() {
  document.getElementById("newCatF").style.display =
    document.getElementById("iCat").value === "__new__" ? "block" : "none";
}

function buildEmoji() {
  const row = document.getElementById("emojiRow");
  row.innerHTML = "";
  EMOJIS.forEach(e => {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "emo" + (e === picked ? " on" : "");
    b.textContent = e;
    b.onclick = () => { picked = e; buildEmoji(); };
    row.appendChild(b);
  });
}

function saveLink() {
  const title = document.getElementById("iTitle").value.trim();
  let url = document.getElementById("iURL").value.trim();
  let catId = document.getElementById("iCat").value;
  if (!title) { toast("⚠️ Enter a link name", "error"); return; }
  if (!url) { toast("⚠️ Enter a URL", "error"); return; }
  if (!/^https?:\/\//.test(url)) url = "https://" + url;
  if (catId === "__new__") {
    const n = document.getElementById("iNewCat").value.trim();
    if (!n) { toast("⚠️ Enter a category name", "error"); return; }
    catId = "c" + Date.now();
    DB.cats.push({ id: catId, name: n });
  }
  if (editId) {
    Object.assign(DB.links.find(l => l.id === editId), { title, url, cat: catId, icon: picked });
    toast("✅ Link updated", "success");
  } else {
    DB.links.push({ id: "l" + Date.now(), title, url, cat: catId, icon: picked });
    toast("✅ Link added", "success");
  }
  persist(); closeModal(); renderAll();
}



function toast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast show " + type;
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.className = "toast"; }, 2800);
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") { closeModal(); closeSettings(); }
  if (e.key === "n" && !["INPUT","SELECT","TEXTAREA"].includes(document.activeElement.tagName)) openModal();
});

renderAll();
</script>
</body>
</html>
