<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bark Ornament — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f0f4fa;
  --surface:   #ffffff;
  --surface2:  #e8eef8;
  --border:    #d0daea;
  --border2:   #b0c0d8;
  --accent:    #1a3faa;
  --accent2:   #2452c8;
  --accent-dim:rgba(26,63,170,0.1);
  --accent-glow:rgba(26,63,170,0.25);
  --sidebar-from:#1a3faa;
  --sidebar-to:  #2e6dd4;
  --text:      #0f1e3d;
  --text2:     #3a5080;
  --text3:     #7a90b8;
  --blue:      #1a3faa;
  --blue-dim:  rgba(26,63,170,0.1);
  --green:     #059669;
  --red:       #dc2626;
  --sh:        0 2px 12px rgba(26,63,170,0.1);
  --sh-lg:     0 8px 32px rgba(26,63,170,0.18);
  /* keep old names mapped so existing styles don't break */
  --gold:      #1a3faa;
  --gold2:     #2452c8;
  --gold-dim:  rgba(26,63,170,0.1);
  --gold-glow: rgba(26,63,170,0.25);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: "DM Sans", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── LAYOUT ─────────────────────────────────── */
.shell { display: flex; min-height: 100vh; }

/* ── SIDEBAR ─────────────────────────────────── */
.sidebar {
  width: 280px; flex-shrink: 0;
  background: linear-gradient(160deg, #1a3faa 0%, #2e6dd4 60%, #3a85e8 100%);
  border-right: none;
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
  overflow: hidden;
  box-shadow: 4px 0 24px rgba(26,63,170,0.2);
}

.sb-brand {
  padding: 28px 24px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  display: flex; flex-direction: row; align-items: center;
  gap: 16px; text-align: left;
  background: transparent;
  position: relative;
  overflow: hidden;
}
.sb-brand::before {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 0% 50%, rgba(255,255,255,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.sb-logo {
  width: 60px; height: 60px; border-radius: 14px;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,0.6);
  box-shadow: 0 0 0 4px rgba(255,255,255,0.15), var(--sh);
  position: relative; z-index: 1;
  background: #fff;
  flex-shrink: 0;
}
.sb-name {
  font-family: "DM Serif Display", serif;
  font-size: 1rem; color: #ffffff; line-height: 1.3;
  position: relative; z-index: 1;
}
.sb-addr {
  font-size: 0.68rem; color: rgba(255,255,255,0.65);
  letter-spacing: 0.3px; line-height: 1.5;
  position: relative; z-index: 1;
}
.sb-pill {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 20px; padding: 3px 12px;
  font-size: 0.62rem; font-weight: 600;
  color: rgba(255,255,255,0.9); letter-spacing: 0.8px;
  text-transform: uppercase;
  position: relative; z-index: 1;
}

/* Sidebar stats */
.sb-stats {
  display: flex; gap: 0;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}
.sb-stat {
  flex: 1; padding: 14px 0; text-align: center;
  border-right: 1px solid rgba(255,255,255,0.15);
}
.sb-stat:last-child { border-right: none; }
.sb-stat-n { font-size: 1.4rem; font-weight: 700; color: #ffffff; line-height: 1; }
.sb-stat-l { font-size: 0.6rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 3px; }

/* Sidebar nav */
.sb-nav { flex: 1; overflow-y: auto; padding: 16px 0; }
.sb-section-label {
  font-size: 0.6rem; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 1.2px;
  padding: 0 20px; margin: 10px 0 6px;
}
.sb-link {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px; cursor: pointer;
  font-size: 0.82rem; font-weight: 500; color: var(--text2);
  text-decoration: none;
  transition: background 0.15s, color 0.15s;
  border-left: 3px solid transparent;
}
.sb-link:hover { background: var(--surface2); color: var(--text); }
.sb-link.active {
  background: var(--gold-dim);
  color: var(--gold);
  border-left-color: var(--gold);
  font-weight: 600;
}
.sb-link-ico {
  width: 32px; height: 32px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; background: var(--surface2);
  flex-shrink: 0; transition: background 0.15s;
}
.sb-link:hover .sb-link-ico,
.sb-link.active .sb-link-ico { background: var(--gold-dim); }

.sb-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.15);
  font-size: 0.7rem; color: rgba(255,255,255,0.5);
  text-align: center;
}

/* ── MAIN ─────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* Topbar */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px; height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 2px 20px rgba(124,58,237,0.07);
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-title {
  font-family: "DM Serif Display", serif;
  font-size: 1.05rem; color: var(--text);
}
.topbar-sub { font-size: 0.72rem; color: var(--text3); }
.topbar-right { display: flex; align-items: center; gap: 10px; }

.search-wrap {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 7px 12px;
  transition: border-color 0.2s;
}
.search-wrap:focus-within { border-color: var(--gold); }
.search-wrap input {
  background: none; border: none; outline: none;
  color: var(--text); font-family: "DM Sans", sans-serif;
  font-size: 0.82rem; width: 180px;
}
.search-wrap input::placeholder { color: var(--text3); }

.btn-add {
  display: flex; align-items: center; gap: 7px;
  background: linear-gradient(135deg, #1a3faa, #2e6dd4);
  color: #ffffff;
  border: none; border-radius: 10px;
  padding: 8px 16px; font-family: "DM Sans", sans-serif;
  font-weight: 700; font-size: 0.8rem; cursor: pointer;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 2px 16px rgba(26,63,170,0.35);
}
.btn-add:hover { background: linear-gradient(135deg, #2452c8, #3a85e8); transform: translateY(-1px); box-shadow: 0 6px 24px rgba(26,63,170,0.45); }

/* Content */
.content { padding: 28px; flex: 1; }

/* Section */
.section { margin-bottom: 32px; }
.sec-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.sec-title {
  display: flex; align-items: center; gap: 10px;
  font-family: "DM Serif Display", serif;
  font-size: 1rem; color: var(--text);
}
.cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sec-badge {
  font-family: "DM Sans", sans-serif;
  font-size: 0.64rem; font-weight: 700;
  background: var(--surface2); color: var(--text3);
  border: 1px solid var(--border2);
  border-radius: 20px; padding: 2px 9px;
}

/* Cards grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}

/* Link card */
.link-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px 18px 18px;
  text-decoration: none; display: block;
  position: relative; overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.18s;
  animation: fadeUp 0.3s ease both;
  cursor: pointer;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.link-card::before {
  content: ""; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--gold), transparent);
  opacity: 0; transition: opacity 0.2s;
}
.link-card:hover {
  border-color: var(--border2);
  box-shadow: 0 8px 32px rgba(124,58,237,0.12);
  transform: translateY(-3px);
}
.link-card:hover::before { opacity: 1; }

.card-ico {
  width: 46px; height: 46px; border-radius: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin-bottom: 14px;
  transition: background 0.2s, border-color 0.2s;
}
.link-card:hover .card-ico {
  background: var(--gold-dim);
  border-color: rgba(232,184,75,0.3);
}
.card-title {
  font-weight: 600; font-size: 0.86rem;
  color: var(--text); line-height: 1.35;
}
.card-arrow {
  position: absolute; bottom: 16px; right: 16px;
  width: 26px; height: 26px; border-radius: 8px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.2s;
}
.link-card:hover .card-arrow {
  background: var(--gold-dim);
  transform: translate(2px, -2px);
}

/* Add card */
.add-card {
  background: transparent;
  border: 1.5px dashed var(--border2);
  border-radius: 16px; padding: 22px 18px;
  cursor: pointer; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; color: var(--text3);
  font-size: 0.78rem; font-weight: 600;
  min-height: 118px;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.add-card:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

/* Empty */
.empty { text-align: center; padding: 72px 24px; color: var(--text3); }
.empty-ico { font-size: 3rem; margin-bottom: 14px; }
.empty-t { font-size: 1rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
.empty-s { font-size: 0.8rem; }

/* ── SETTINGS PANEL ─────────────────── */
.settings-overlay {
  position: fixed; inset: 0;
  background: rgba(30,27,46,0.35); backdrop-filter: blur(4px);
  z-index: 350; opacity: 0; pointer-events: none; transition: opacity 0.22s;
}
.settings-overlay.open { opacity: 1; pointer-events: all; }
.settings-panel {
  position: absolute; right: 0; top: 0; bottom: 0; width: 360px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform 0.25s ease;
}
.settings-overlay.open .settings-panel { transform: translateX(0); }
.settings-hd {
  padding: 22px 24px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.settings-ttl { font-family: "DM Serif Display", serif; font-size: 1.05rem; color: var(--text); }
.settings-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.settings-section { margin-bottom: 26px; }
.settings-section-label {
  font-size: 0.62rem; font-weight: 700; color: var(--gold);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
}
.cat-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface2);
  margin-bottom: 8px;
}
.cat-item-name { flex: 1; font-size: 0.84rem; font-weight: 500; color: var(--text); }
.cat-item-count { font-size: 0.7rem; color: var(--text3); font-weight: 500; margin-right: 4px; }
.ico-btn {
  width: 28px; height: 28px; border-radius: 7px; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: background 0.15s;
}
.ico-btn.e { background: var(--blue-dim); color: var(--blue); }
.ico-btn.e:hover { background: rgba(79,142,247,0.2); }
.ico-btn.d { background: rgba(240,96,96,0.1); color: var(--red); }
.ico-btn.d:hover { background: rgba(240,96,96,0.2); }
.btn-settings-new {
  width: 100%; padding: 9px; border-radius: 10px;
  background: var(--surface2); border: 1px dashed var(--border2);
  color: var(--text2); font-family: "DM Sans", sans-serif;
  font-size: 0.82rem; font-weight: 600; cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.btn-settings-new:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

/* ── MODAL ─────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(30,27,46,0.45); backdrop-filter: blur(6px);
  z-index: 400; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border-radius: 20px; padding: 28px 30px;
  width: 440px; max-width: 95vw;
  box-shadow: var(--sh-lg);
  border: 1px solid var(--border2);
  border-top: 2px solid var(--gold);
  transform: scale(0.96) translateY(10px);
  transition: transform 0.22s cubic-bezier(.34,1.3,.64,1);
}
.overlay.open .modal { transform: scale(1) translateY(0); }
.modal-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
.modal-ttl { font-family: "DM Serif Display", serif; font-size: 1.05rem; color: var(--text); }
.modal-x {
  width: 30px; height: 30px; border-radius: 8px; border: none;
  background: var(--surface2); color: var(--text3); cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.modal-x:hover { background: var(--border2); color: var(--text); }
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 0.67rem; font-weight: 700;
  color: var(--text3); text-transform: uppercase; letter-spacing: 0.9px; margin-bottom: 6px;
}
.field input, .field select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 9px 13px; color: var(--text);
  font-family: "DM Sans", sans-serif; font-size: 0.86rem; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field input:focus, .field select:focus {
  border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim);
}
.field select option { background: var(--surface2); }
.emoji-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
.emo {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1px solid var(--border2); background: var(--surface2);
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, background 0.15s;
}
.emo:hover { background: var(--surface); border-color: var(--border2); }
.emo.on { border-color: var(--gold); background: var(--gold-dim); }
.modal-ft { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
.btn-cancel {
  padding: 9px 18px; border-radius: 10px; border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text2);
  font-family: "DM Sans", sans-serif; font-weight: 600;
  font-size: 0.82rem; cursor: pointer; transition: background 0.15s;
}
.btn-cancel:hover { background: var(--border2); }
.ren-input {
  background: var(--surface); border: 1px solid var(--gold);
  border-radius: 6px; padding: 3px 8px; color: var(--text);
  font-family: "DM Sans", sans-serif; font-size: 0.84rem; outline: none;
}

/* ── TOAST ─────────────────── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); padding: 12px 18px;
  border-radius: 12px; font-size: 0.82rem; font-weight: 500;
  box-shadow: var(--sh); z-index: 999;
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { border-left: 3px solid var(--green); }
.toast.error   { border-left: 3px solid var(--red); }
.toast.info    { border-left: 3px solid var(--blue); }

/* Settings icon button */
.btn-settings-ico {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
  flex-shrink: 0;
}
.btn-settings-ico:hover {
  background: var(--gold-dim); border-color: var(--gold);
  color: var(--gold); transform: rotate(30deg);
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>

<div class="shell">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="sb-brand">
      <!-- Upload your logo as "bark_logo.png" to the same GitHub repo folder -->
      <img class="sb-logo" src="Logo.jpg" alt="Bark Ornament" onerror="this.style.display='none'">
      <div style="position:relative;z-index:1">
        <div class="sb-name">Bark Ornament Private Ltd</div>
        <div class="sb-addr">No. 59A Bekkegama, Panadura</div>
      </div>
    </div>

    <div class="sb-stats">
      <div class="sb-stat">
        <div class="sb-stat-n" id="kpiLinks">0</div>
        <div class="sb-stat-l">Links</div>
      </div>
      <div class="sb-stat">
        <div class="sb-stat-n" id="kpiCats">0</div>
        <div class="sb-stat-l">Categories</div>
      </div>
    </div>

    <nav class="sb-nav" id="sideNav" style="display:none"></nav>

    <div class="sb-footer">Bark Ornament Pvt Ltd &copy; 2025</div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">Dashboard</div>
      </div>
      <div class="topbar-right">
        <button class="btn-add" onclick="openModal()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
          Add Link
        </button>
        <button class="btn-settings-ico" onclick="openSettings()" title="Settings" aria-label="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div>

    <!-- Content -->
    <div class="content" id="content"></div>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div class="settings-overlay" id="settingsOverlay" onclick="settingsBgClick(event)">
  <div class="settings-panel">
    <div class="settings-hd">
      <div class="settings-ttl">Settings</div>
      <button class="modal-x" onclick="closeSettings()">✕</button>
    </div>
    <div class="settings-body">
      <div class="settings-section">
        <div class="settings-section-label">Manage Categories</div>
        <div id="catList"></div>
        <button class="btn-settings-new" onclick="addCategoryFromSettings()">＋ New Category</button>
      </div>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="overlay" onclick="bgClick(event)">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-ttl" id="mTitle">Add New Link</div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="field">
      <label>Link Name</label>
      <input type="text" id="iTitle" placeholder="e.g. Main Cash Book">
    </div>
    <div class="field">
      <label>URL</label>
      <input type="text" id="iURL" placeholder="https://...">
    </div>
    <div class="field">
      <label>Category</label>
      <select id="iCat" onchange="catChange()"></select>
    </div>
    <div class="field" id="newCatF" style="display:none">
      <label>New Category Name</label>
      <input type="text" id="iNewCat" placeholder="e.g. Finance Tools">
    </div>
    <div class="field">
      <label>Icon</label>
      <div class="emoji-row" id="emojiRow"></div>
    </div>
    <div class="modal-ft">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-add" onclick="saveLink()" style="box-shadow:none">Save Link</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const EMOJIS = ["📊","🏦","📋","💰","🧾","📁","🗂️","📈","📌","🔑","🌐","📧","📦","🛒","✈️","🔧","⚙️","💼","📝","🎯","🗃️","📅","💡","🔗","🖥️","📤","📥","🏷️","📞","🌍"];
const COLORS = ["#e8b84b","#4f8ef7","#3ecf8e","#a78bfa","#f06060","#fb923c","#38bdf8"];

let DB = JSON.parse(localStorage.getItem("boDash4") || "null") || {
  cats: [
    { id: "c1", name: "Finance & Reports" },
    { id: "c2", name: "Tools & Apps" }
  ],
  links: [
    { id: "l1", title: "Main Cash Book",      url: "https://barkornamentjaz.github.io/bark-ornament-Main-Cash/index.html", cat: "c1", icon: "🏦" },
    { id: "l2", title: "Daily Finance Report", url: "https://barkornamentjaz.github.io/DailyReport/",                      cat: "c1", icon: "📊" },
    { id: "l3", title: "Sha & Sha Invoice",    url: "https://barkornamentjaz.github.io/Invoices_Ship_Sha/",                cat: "c1", icon: "🧾" },
    { id: "l4", title: "Meeting Minutes",      url: "#",                                                                   cat: "c1", icon: "📝" }
  ]
};

let editId = null, picked = "🔗";
const persist = () => localStorage.setItem("boDash4", JSON.stringify(DB));

function renderAll() {
  document.getElementById("kpiLinks").textContent = DB.links.length;
  document.getElementById("kpiCats").textContent  = DB.cats.length;

  const q    = "";
  const area = document.getElementById("content");
  const nav  = document.getElementById("sideNav");
  area.innerHTML = "";
  nav.innerHTML  = "";

  const fl = q ? DB.links.filter(l => l.title.toLowerCase().includes(q)) : DB.links;

  if (!DB.links.length) {
    area.innerHTML = `<div class="empty"><div class="empty-ico">🚀</div><div class="empty-t">No links yet</div><div class="empty-s">Click <b>Add Link</b> to get started</div></div>`;
    return;
  }

  DB.cats.forEach((cat, idx) => {
    const items = fl.filter(l => l.cat === cat.id);
    const color = COLORS[idx % COLORS.length];

    // Sidebar nav item
    const sli = document.createElement("a");
    sli.className = "sb-link" + (idx === 0 ? " active" : "");
    sli.href = "#sec_" + cat.id;
    sli.innerHTML = `<div class="sb-link-ico">📂</div><span>${cat.name}</span>`;
    sli.onclick = (e) => {
      document.querySelectorAll(".sb-link").forEach(el => el.classList.remove("active"));
      sli.classList.add("active");
    };
    nav.appendChild(sli);

    if (!items.length) return;

    // Section
    const sec = document.createElement("div");
    sec.className = "section";
    sec.id = "sec_" + cat.id;
    sec.innerHTML = `
      <div class="sec-head">
        <div class="sec-title">
          <span class="cat-dot" style="background:${color}"></span>
          ${cat.name}
          <span class="sec-badge">${items.length}</span>
        </div>
      </div>
      <div class="cards-grid" id="g_${cat.id}"></div>`;
    area.appendChild(sec);

    const grid = document.getElementById("g_" + cat.id);
    items.forEach((lnk, i) => {
      const a = document.createElement("a");
      a.className = "link-card";
      a.href = lnk.url; a.target = "_blank"; a.rel = "noopener noreferrer";
      a.style.animationDelay = (i * 0.06) + "s";
      a.innerHTML = `
        <div class="card-ico">${lnk.icon}</div>
        <div class="card-title">${lnk.title}</div>
        <div class="card-arrow">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
          </svg>
        </div>`;
      grid.appendChild(a);
    });

    // Add card
    const add = document.createElement("div");
    add.className = "add-card";
    add.onclick = () => openModal(cat.id);
    add.innerHTML = `<span style="font-size:1.3rem">＋</span><span>Add Link</span>`;
    grid.appendChild(add);
  });

  // Uncategorised
  const known = DB.cats.map(c => c.id);
  const uncat = fl.filter(l => !known.includes(l.cat));
  if (uncat.length) {
    const sec = document.createElement("div"); sec.className = "section";
    sec.innerHTML = `<div class="sec-head"><div class="sec-title"><span class="cat-dot" style="background:var(--text3)"></span>Uncategorised<span class="sec-badge">${uncat.length}</span></div></div><div class="cards-grid" id="gU"></div>`;
    area.appendChild(sec);
    uncat.forEach(lnk => {
      const a = document.createElement("a");
      a.className = "link-card"; a.href = lnk.url; a.target = "_blank";
      a.innerHTML = `<div class="card-ico">${lnk.icon}</div><div class="card-title">${lnk.title}</div><div class="card-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></div>`;
      document.getElementById("gU").appendChild(a);
    });
  }
}

// SETTINGS
function openSettings() { renderCatList(); document.getElementById("settingsOverlay").classList.add("open"); }
function closeSettings() { document.getElementById("settingsOverlay").classList.remove("open"); }
function settingsBgClick(e) { if (e.target.id === "settingsOverlay") closeSettings(); }

function renderCatList() {
  const list = document.getElementById("catList"); list.innerHTML = "";
  DB.cats.forEach(cat => {
    const count = DB.links.filter(l => l.cat === cat.id).length;
    const item = document.createElement("div"); item.className = "cat-item";
    item.innerHTML = `<span class="cat-item-name" id="sl_${cat.id}">${cat.name}</span><span class="cat-item-count">${count} link${count !== 1 ? "s" : ""}</span><button class="ico-btn e" onclick="renCatSettings('${cat.id}')">✏️</button><button class="ico-btn d" onclick="delCat('${cat.id}', true)">🗑️</button>`;
    list.appendChild(item);
  });
}

function renCatSettings(id) {
  const cat = DB.cats.find(c => c.id === id);
  const el = document.getElementById("sl_" + id);
  if (!el) return;
  el.innerHTML = `<input class="ren-input" id="sri_${id}" value="${cat.name}" style="width:100%">`;
  const inp = document.getElementById("sri_" + id);
  inp.focus(); inp.select();
  const done = () => { if (inp.value.trim()) { cat.name = inp.value.trim(); persist(); } renderCatList(); renderAll(); };
  inp.onblur = done;
  inp.onkeydown = e => { if (e.key === "Enter") done(); if (e.key === "Escape") renderCatList(); };
}

function addCategoryFromSettings() {
  const name = prompt("New category name:");
  if (!name || !name.trim()) return;
  DB.cats.push({ id: "c" + Date.now(), name: name.trim() });
  persist(); renderCatList(); renderAll();
}

function delCat(id, fromSettings = false) {
  const n = DB.links.filter(l => l.cat === id).length;
  if (!confirm("Delete this category" + (n ? " and its " + n + " link(s)" : "") + "?")) return;
  DB.cats = DB.cats.filter(c => c.id !== id);
  DB.links = DB.links.filter(l => l.cat !== id);
  persist();
  if (fromSettings) renderCatList();
  renderAll(); toast("🗑️ Category deleted", "info");
}

// MODAL
function openModal(defCat = null) {
  editId = null; picked = "🔗";
  document.getElementById("mTitle").textContent = "Add New Link";
  document.getElementById("iTitle").value = "";
  document.getElementById("iURL").value = "";
  buildSel(defCat); buildEmoji();
  document.getElementById("overlay").classList.add("open");
  setTimeout(() => document.getElementById("iTitle").focus(), 100);
}
function editLink(id) {
  const lnk = DB.links.find(l => l.id === id); if (!lnk) return;
  editId = id; picked = lnk.icon;
  document.getElementById("mTitle").textContent = "Edit Link";
  document.getElementById("iTitle").value = lnk.title;
  document.getElementById("iURL").value = lnk.url;
  buildSel(lnk.cat); buildEmoji();
  document.getElementById("overlay").classList.add("open");
}
function closeModal() { document.getElementById("overlay").classList.remove("open"); editId = null; }
function bgClick(e) { if (e.target.id === "overlay") closeModal(); }

function buildSel(sel) {
  const s = document.getElementById("iCat"); s.innerHTML = "";
  DB.cats.forEach(c => { const o = document.createElement("option"); o.value = c.id; o.textContent = c.name; if (c.id === sel) o.selected = true; s.appendChild(o); });
  const no = document.createElement("option"); no.value = "__new__"; no.textContent = "＋ New Category..."; s.appendChild(no);
  if (!sel && DB.cats.length) s.value = DB.cats[0].id;
  document.getElementById("newCatF").style.display = "none";
}
function catChange() { document.getElementById("newCatF").style.display = document.getElementById("iCat").value === "__new__" ? "block" : "none"; }

function buildEmoji() {
  const row = document.getElementById("emojiRow"); row.innerHTML = "";
  EMOJIS.forEach(e => {
    const b = document.createElement("button"); b.type = "button";
    b.className = "emo" + (e === picked ? " on" : ""); b.textContent = e;
    b.onclick = () => { picked = e; buildEmoji(); };
    row.appendChild(b);
  });
}

function saveLink() {
  const title = document.getElementById("iTitle").value.trim();
  let url = document.getElementById("iURL").value.trim();
  let catId = document.getElementById("iCat").value;
  if (!title) { toast("⚠️ Enter a link name", "error"); return; }
  if (!url)   { toast("⚠️ Enter a URL", "error"); return; }
  if (!/^https?:\/\//.test(url)) url = "https://" + url;
  if (catId === "__new__") {
    const n = document.getElementById("iNewCat").value.trim();
    if (!n) { toast("⚠️ Enter a category name", "error"); return; }
    catId = "c" + Date.now(); DB.cats.push({ id: catId, name: n });
  }
  if (editId) {
    Object.assign(DB.links.find(l => l.id === editId), { title, url, cat: catId, icon: picked });
    toast("✅ Link updated", "success");
  } else {
    DB.links.push({ id: "l" + Date.now(), title, url, cat: catId, icon: picked });
    toast("✅ Link added", "success");
  }
  persist(); closeModal(); renderAll();
}

function toast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast show " + type;
  clearTimeout(t._t); t._t = setTimeout(() => { t.className = "toast"; }, 2800);
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") { closeModal(); closeSettings(); }
  if (e.key === "n" && !["INPUT","SELECT","TEXTAREA"].includes(document.activeElement.tagName)) openModal();
});

renderAll();
</script>
</body>
</html>
